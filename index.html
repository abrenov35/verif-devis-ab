<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AB RENOV — Outil d'analyse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    :root {
      --navy:    #162D49;
      --navy-dk: #0C1E33;
      --cream:   #F3EAE2;
      --lav:     #A495C3;
      --lav-bg:  #F0EDF8;
      --white:   #FFFFFF;
      --grey:    #7F7A76;
      --grey-lt: #E8E0D8;
      --red:     #D0392B;
      --orange:  #C86020;
      --green:   #1E7A4A;
      --gold:    #9B7B1A;
      --r: 12px;
      --shadow: 0 4px 12px rgba(22,45,73,.05);
      --shadow-lg: 0 8px 24px rgba(22,45,73,.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--cream);
      color: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-variant-numeric: tabular-nums;
    }

    /* ── HEADER ── */
    header {
      background: var(--navy);
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 1.4rem;
      color: var(--white); letter-spacing: .02em;
      display: flex; align-items: center; gap: 10px;
    }
    .logo span { color: var(--lav); }
    .logo-pipe { width:1px; height:20px; background:rgba(255,255,255,.2); }
    .logo-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .75rem; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--lav); opacity: .85;
    }
    .header-right {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .7rem; letter-spacing: .1em;
      text-transform: uppercase; color: rgba(255,255,255,.3);
    }

    /* ── TABS ── */
    .tabs {
      background: var(--white);
      border-bottom: 1px solid var(--grey-lt);
      display: flex;
      padding: 0 24px;
      flex-shrink: 0;
      overflow-x: auto;
    }
    .tab {
      display: flex; align-items: center; gap: 8px;
      padding: 0 16px;
      height: 48px;
      border: none;
      border-bottom: 3px solid transparent;
      background: transparent;
      cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: .8rem;
      letter-spacing: .06em; text-transform: uppercase;
      color: #9A9A9A;
      transition: all .2s;
      white-space: nowrap;
    }
    .tab:hover { color: var(--navy); }
    .tab.active { color: var(--navy); border-bottom-color: var(--navy); }
    .tab.active.t-fourn { border-bottom-color: var(--orange); color: var(--orange); }
    .tab.active.t-presta { border-bottom-color: var(--lav); color: var(--lav); }
    .tab-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .t-devis .tab-dot  { background: var(--red); }
    .t-fourn .tab-dot  { background: var(--orange); }
    .t-presta .tab-dot { background: var(--lav); }
    .t-histo .tab-dot { background: var(--grey); }

    /* ── TOOLBAR ── */
    .toolbar {
      background: #FDFAF7;
      border-bottom: 1px solid var(--grey-lt);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .file-pill {
      position: relative;
      display: flex; align-items: center; gap: 8px;
      height: 36px; padding: 0 16px;
      border: 1.5px dashed var(--grey-lt);
      border-radius: 18px; cursor: pointer;
      background: var(--white); transition: all .2s;
    }
    .file-pill:hover { border-color: var(--lav); background: var(--lav-bg); }
    .file-pill.has-file { border-style: solid; border-color: var(--green); background: #F0FAF5; }
    .file-pill input { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 2; }
    .file-pill-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: .8rem;
      letter-spacing: .04em; text-transform: uppercase;
      color: var(--navy); white-space: nowrap; z-index: 1;
    }
    .file-pill.has-file .file-pill-text { color: var(--green); }

    .extra-fields { display: none; align-items: center; gap: 8px; flex-wrap: wrap; }
    .extra-fields.show { display: flex; }

    .field-input {
      height: 36px;
      border: 1.5px solid var(--grey-lt);
      border-radius: 18px;
      padding: 0 16px;
      font-family: 'Barlow', sans-serif;
      font-size: .85rem;
      color: var(--navy);
      background: var(--white);
      outline: none;
      transition: border-color .15s;
    }
    .field-input:focus { border-color: var(--lav); }
    .field-input.w-lot { width: 180px; }
    .field-input.w-presta { width: 160px; }
    .field-input.w-note { width: 260px; }

    .tsep { width: 1px; height: 24px; background: var(--grey-lt); }

    .tbtn {
      display: flex; align-items: center; gap: 8px;
      height: 36px; padding: 0 18px;
      border: none; border-radius: 18px;
      cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: .8rem;
      letter-spacing: .05em; text-transform: uppercase;
      transition: all .15s; white-space: nowrap;
    }
    .tbtn:active { transform: scale(.97); }
    .tbtn:disabled { opacity:.35; cursor:not-allowed; transform:none; }
    .tbtn-navy  { background: var(--navy); color: var(--white); }
    .tbtn-navy:hover:not(:disabled)  { background: var(--navy-dk); }
    .tbtn-lav   { background: var(--lav); color: var(--white); }
    .tbtn-lav:hover:not(:disabled)   { background: #8F7FB0; }
    .tbtn-ghost { background: transparent; border: 1.5px solid var(--grey-lt); color: var(--navy); }
    .tbtn-ghost:hover:not(:disabled) { border-color: var(--navy); background: rgba(22,45,73,.02); }

    #status {
      display: none; align-items: center; gap: 8px;
      font-size: .8rem; font-weight: 500;
      padding: 6px 14px; border-radius: 18px;
    }
    #status.loading { display: flex; background: var(--lav-bg); color: #5B44A0; }
    #status.error   { display: flex; background: #FEF2F2; color: var(--red); max-width: 360px; }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid currentColor; border-top-color: transparent;
      border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CONTENT CONTAINER ── */
    .content {
      flex: 1;
      max-width: 1300px;
      width: 100%;
      margin: 0 auto;
      padding: 24px;
      overflow-y: auto;
    }

    /* EMPTY STATE */
    #empty {
      height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; gap: 12px; padding: 60px 20px;
    }
    .empty-icon { font-size: 3rem; opacity: .3; margin-bottom: 4px; }
    .empty-h {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 1.3rem;
      letter-spacing: .06em; text-transform: uppercase; opacity: .4;
    }
    .empty-p { font-size: .9rem; max-width: 320px; line-height: 1.5; color: var(--grey); }

    /* RESULTS WRAPPER */
    #results { display: none; flex-direction: column; gap: 20px; animation: fadeUp .3s ease-out; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* VERDICT BANNER */
    .verdict {
      border-radius: var(--r);
      padding: 20px 24px;
      display: flex; align-items: flex-start; gap: 16px;
      box-shadow: var(--shadow-lg);
      color: var(--white);
    }
    .verdict.v-devis  { background: var(--navy); }
    .verdict.v-fourn  { background: #3D1F08; }
    .verdict.v-presta { background: #1E1233; }

    .verdict-badge { font-size: 2rem; line-height: 1; }
    .verdict-content { flex: 1; }
    .verdict-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .75rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--lav); margin-bottom: 6px;
    }
    .verdict.v-fourn .verdict-label { color: #F0A060; }
    .verdict-text { font-size: 1.05rem; line-height: 1.5; font-weight: 500; }

    /* GRID SECTIONS */
    .sections { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; align-items: start; }
    .sec {
      background: var(--white);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      border: 1px solid rgba(22,45,73,.05);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .sec.full { grid-column: 1 / -1; }

    .sec-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 20px;
      border-bottom: 1px solid #F2EBE3;
      background: rgba(22,45,73,.01);
      min-height: 52px;
    }
    .sec-icon {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; flex-shrink: 0; font-weight: bold;
    }
    .sec-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: .8rem;
      letter-spacing: .1em; text-transform: uppercase; color: var(--navy);
    }

    /* ITEMS LIST */
    .sec-items { padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
    .item {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 12px 14px; border-radius: 8px;
      background: #FDFAF7; border-left: 4px solid var(--grey-lt);
      font-size: .95rem; line-height: 1.45; color: #1E2630;
    }
    .item span { flex: 1; }
    .item-bullet { width: 6px; height: 6px; border-radius: 50%; margin-top: 7px; flex-shrink: 0; display: none; }

    /* KEY-VALUE ROWS (SYNTHESE) */
    .kv-row {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 16px; align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid #F2EBE3;
    }
    .kv-row:last-child { border-bottom: none; }
    .kv-label { font-size: .85rem; color: var(--grey); font-weight: 500; }
    .kv-value { font-size: 1rem; font-weight: 700; color: var(--navy); text-align: right; }

    /* PRICE TABLE (FOURNISSEUR) */
    .price-table-wrapper { padding: 16px 20px; overflow-x: auto; }
    .price-table { width: 100%; border-collapse: collapse; font-size: .9rem; text-align: left; }
    .price-table th {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: .75rem;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--grey); padding: 10px 12px;
      border-bottom: 2px solid var(--grey-lt); background: #FDFAF7;
    }
    .price-table td { padding: 12px; border-bottom: 1px solid #F2EBE3; vertical-align: top; line-height: 1.4; }
    .price-table tr:last-child td { border-bottom: none; }
    .price-table tr:hover td { background: #FDFAF7; }

    /* THEMES COLORS */
    .c-red .item     { border-left-color: var(--red); background: #FEF2F2; color: #8B0000; }
    .c-red .sec-icon { background: #FEE8E6; color: var(--red); }
    
    .c-orange .item { border-left-color: var(--orange); background: #FFF7F2; }
    .c-orange .sec-icon { background: #FEEEE6; color: var(--orange); }

    .c-lav .item     { border-left-color: var(--lav); background: #F8F6FD; }
    .c-lav .sec-icon { background: var(--lav-bg); color: #5B44A0; }

    /* CONSEIL & TEXT BOXES */
    .sec-conseil { background: var(--lav-bg); border-color: #D4CCE8; }
    .sec-conseil .sec-header { background: rgba(164, 149, 195, 0.05); border-bottom-color: #D4CCE8; }
    .sec-conseil .item { background: rgba(255,255,255,.7); border-left-color: var(--lav); }

    .sms-box {
      background: var(--white);
      border-left: 4px solid var(--green);
      padding: 16px; border-radius: 8px;
      font-family: 'Barlow', sans-serif; font-size: .95rem; line-height: 1.6;
      color: var(--navy-dk); white-space: pre-wrap; word-break: break-word;
      box-shadow: inset 0 1px 4px rgba(0,0,0,.02);
    }
    .sms-actions { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }

    .sms-client-bar {
      background: #EEF4FC; border: 1.5px solid #BDD4EE; border-radius: var(--r);
      padding: 14px 20px; display: flex; align-items: center; gap: 16px; justify-content: space-between;
    }
    .sms-client-text { font-size: .95rem; color: #1E3050; line-height: 1.5; white-space: pre-wrap; }

    /* RECALCULATE BAR */
    .recalcul-bar {
      background: #F8F6FD; border: 2px solid #CFC4E6; border-radius: var(--r);
      padding: 16px; display: flex; flex-direction: column; gap: 12px;
    }
    .recalcul-label {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: .75rem;
      letter-spacing: .1em; text-transform: uppercase; color: #A495C3;
    }
    .recalcul-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .recalcul-chip {
      padding: 5px 14px; border: 1.5px solid #D4CCE8; border-radius: 20px; background: #white;
      font-size: .8rem; color: #6B5A9A; cursor: pointer; transition: all .15s;
    }
    .recalcul-chip:hover, .recalcul-chip.on { background: var(--lav); border-color: var(--lav); color: var(--white); }
    .recalcul-row { display: flex; gap: 12px; align-items: flex-end; }
    .recalcul-textarea {
      flex: 1; min-height: 60px; max-height: 120px; resize: vertical;
      border: 1.5px solid #D4CCE8; border-radius: 8px; padding: 10px 14px;
      font-family: 'Barlow', sans-serif; font-size: .95rem; color: var(--navy); outline: none;
    }
    .recalcul-textarea:focus { border-color: var(--lav); }
    .recalcul-btn {
      height: 42px; padding: 0 24px; background: var(--navy); color: var(--white);
      border: none; border-radius: 21px; cursor: pointer; font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: .8rem; letter-spacing: .05em; text-transform: uppercase; transition: background .15s;
    }
    .recalcul-btn:hover { background: var(--navy-dk); }
    .recalcul-note { font-size: .75rem; color: #9A8EAA; }

    /* ── HISTORIQUE RECHERCHES (FLUIDE & PROPRE) ── */
    .history-wrap { display: flex; flex-direction: column; gap: 16px; width: 100%; }
    .history-head {
      background: var(--navy); color: var(--white); border-radius: var(--r);
      padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .history-title { font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
    .history-sub { font-size: .85rem; opacity: .8; margin-top: 2px; }
    .history-list { display: flex; flex-direction: column; gap: 12px; width: 100%; }
    
    .history-card {
      background: var(--white); border-radius: var(--r); border: 1px solid #E5DDD4;
      padding: 16px; box-shadow: var(--shadow);
      display: grid; grid-template-columns: 220px 1fr auto; align-items: center; gap: 20px;
    }
    .history-card-top { display: flex; flex-direction: column; gap: 4px; }
    .history-type { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: .75rem; letter-spacing: .08em; text-transform: uppercase; color: var(--lav); }
    .history-file { font-weight: 700; font-size: 1rem; color: var(--navy); line-height: 1.3; word-break: break-all; }
    .history-date { font-size: .8rem; color: var(--grey); }
    .history-summary { font-size: .95rem; line-height: 1.4; color: #1E2630; background: #FCFAF8; border-left: 4px solid var(--lav); padding: 12px; border-radius: 6px; }
    .history-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .history-empty { background: var(--white); border-radius: var(--r); padding: 40px; color: var(--grey); text-align: center; border: 2px dashed #D8CEC5; }

    /* FOOTER */
    footer {
      text-align: center; padding: 12px;
      font-family: 'Barlow Condensed', sans-serif; font-size: .7rem; letter-spacing: .05em; text-transform: uppercase;
      color: var(--grey); border-top: 1px solid var(--grey-lt); flex-shrink: 0; background: rgba(22,45,73,.01);
    }

    /* ── RESPONSIVE DESIGN ── */
    @media (max-width: 1024px) {
      .sections { grid-template-columns: 1fr; gap: 16px; }
      .history-card { grid-template-columns: 1fr; gap: 12px; }
      .history-actions { justify-content: flex-start; }
      .kv-row { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 640px) {
      .content { padding: 16px; }
      .toolbar { padding: 10px 16px; gap: 8px; }
      .tabs { padding: 0 16px; }
      .header-right { display: none; }
      .recalcul-row { flex-direction: column; align-items: stretch; }
      .recalcul-btn { width: 100%; text-align: center; justify-content: center; }
      .kv-row { grid-template-columns: 1fr; gap: 4px; }
      .kv-value { text-align: left; }
      .sms-client-bar { flex-direction: column; align-items: stretch; gap: 12px; }
      .sms-client-bar button { align-self: flex-start; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    AB <span>RENOV</span>
    <div class="logo-pipe"></div>
    <span class="logo-sub">Outil d'analyse</span>
  </div>
  <div class="header-right">Outil interne — Confidentiel</div>
</header>

<!-- TABS -->
<div class="tabs">
  <button class="tab t-devis active" data-tab="devis">
    <div class="tab-dot"></div>
    Vérification devis client
  </button>
  <button class="tab t-fourn" data-tab="fourn">
    <div class="tab-dot"></div>
    Devis fournisseur / Revente
  </button>
  <button class="tab t-presta" data-tab="presta">
    <div class="tab-dot"></div>
    Prestataire main-d'œuvre
  </button>
  <button class="tab t-histo" data-tab="historique">
    <div class="tab-dot"></div>
    Historique recherches
  </button>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="file-pill" id="file-pill">
    <input type="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg" />
    <span class="file-pill-text" id="file-pill-text">📄 Choisir un fichier</span>
  </div>

  <div class="extra-fields" id="extra-fourn"></div>

  <div class="extra-fields" id="extra-presta">
    <input type="text" class="field-input w-lot"    id="inp-lot"    placeholder="Lot (ex: faïence, plomberie…)" />
    <input type="text" class="field-input w-presta" id="inp-presta" placeholder="Nom du prestataire" />
    <input type="text" class="field-input w-note"   id="inp-note"   placeholder="Infos utiles : surface, accès, contraintes…" />
  </div>

  <div class="tsep"></div>

  <button class="tbtn tbtn-navy" id="btn-analyze" disabled>
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <circle cx="5" cy="5" r="3.8" stroke="white" stroke-width="1.3"/>
      <path d="M8.5 8.5L11 11" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
    Analyser
  </button>

  <button class="tbtn tbtn-lav" id="btn-copy" style="display:none">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <rect x="3.5" y="3.5" width="7.5" height="7.5" rx="1" stroke="white" stroke-width="1.2"/>
      <path d="M2 8.5V2A1 1 0 013 1H8.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    Copier
  </button>

  <button class="tbtn tbtn-ghost" id="btn-reset" style="display:none">↗ Nouvelle analyse</button>

  <div id="status">
    <div class="spinner"></div>
    <span id="status-text">Analyse…</span>
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <div id="empty">
    <div class="empty-icon" id="empty-icon">📋</div>
    <div class="empty-h" id="empty-h">Aucun fichier chargé</div>
    <div class="empty-p" id="empty-p">Choisissez un fichier et cliquez sur Analyser.</div>
  </div>

  <div id="results"></div>
</div>

<footer>AB RENOV — Aménagement et Rénovation &nbsp;|&nbsp; Outil interne confidentiel</footer>

<script>
/* ================================================================
   CONFIG
================================================================ */
const PROXY_URL = "https://cool-cell-9dbd.abrenov35.workers.dev";
const AI_MODEL  = "claude-sonnet-4-5";
const AI_TOKENS = 2500;

pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* ================================================================
   PROMPTS PAR TAB
================================================================ */

fileInput.addEventListener("change", () => {

function loadFile(f) {
  currentFile = f;
  const name = f.name.length > 26 ? f.name.slice(0, 24) + "…" : f.name;
  filePillTxt.textContent = "📄 " + name;
  filePill.classList.add("has-file");
  btnAnalyze.disabled = false;
  hideStatus();
  hideResults();
}

async function extractPdf(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const c = await page.getTextContent();
    text += c.items.map(x => x.str).join(" ") + "\n";
  }
  return text.trim();
}

async function extractImageText(file) {
  const result = await Tesseract.recognize(file, 'fra');
  return result.data.text;
}

/* ================================================================
   API CALL
================================================================ */
async function callAI(devisText) {
  let systemPrompt = PROMPTS[currentTab];
  let userContext = "";

  if (currentTab === "presta") {
    const lot = document.getElementById("inp-lot")?.value.trim() || "";
    const presta = document.getElementById("inp-presta")?.value.trim() || "";
    const note = document.getElementById("inp-note")?.value.trim() || "";

    userContext = [
      lot ? `Lot : ${lot}` : "",
      presta ? `Prestataire : ${presta}` : "",
      note ? `Informations : ${note}` : ""
    ].filter(Boolean).join(" | ");

    systemPrompt = systemPrompt.replace("{CONTEXT}", userContext || "Aucun contexte fourni.");
  }

  const contextBlock = userContext ? `\n\nContexte utilisateur :\n${userContext}\n` : "";
  const userMsg = `Voici le contenu du document :${contextBlock}\n\n---\n${devisText.slice(0, 14000)}\n---\n\nRetourne le JSON.`;

  const resp = await fetch(PROXY_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: AI_MODEL, max_tokens: AI_TOKENS,
      system: systemPrompt,
      messages: [{ role: "user", content: userMsg }]
    })
  });

  const data = await resp.json();
  if (data.error) throw new Error(data.error.message || "Erreur API");
  const raw = data.content?.map(b => b.text || "").join("") || "";
  const clean = raw.replace(/```json|
```/g, "").trim();

  try {
    return JSON.parse(clean);
  } catch (e) {
    throw new Error("Format JSON inattendu.");
  }
}

btnAnalyze.addEventListener("click", async () => {
  if (!currentFile && fileInput.files && fileInput.files[0]) currentFile = fileInput.files[0];
  if (!currentFile) { showError("Aucun fichier sélectionné."); return; }
  
  btnAnalyze.disabled = true;
  hideResults();
  showStatus("loading", "Lecture du fichier…");
  
  try {
    let text = "";
    if (currentFile.type === "application/pdf") {
      text = await extractPdf(currentFile);
      if (!text || text.length < 20) {
        showStatus("loading", "PDF scanné détecté — OCR…");
        text = await extractImageText(currentFile);
      }
    } else {
      showStatus("loading", "Lecture OCR image…");
      text = await extractImageText(currentFile);
    }
    
    lastExtractedText = text;
    showStatus("loading", "Analyse IA en cours… (20-30 sec)");
    const result = await callAI(text);
    renderResults(result);
    hideStatus();
    btnAnalyze.disabled = false;
    btnCopy.style.display  = "flex";
    btnReset.style.display = "flex";
  } catch (err) {
    showError(err.message);
    btnAnalyze.disabled = false;
  }
});

  fourn:  ["Client fournit le carrelage","Prix remisé pro inclus","Commande urgente sous 48h"],

function renderRecalculBar(fromHistory, historyId) {
  const tab = (currentTab === "historique") ? "devis" : currentTab;
  const chips = (CHIPS[tab] || CHIPS.devis).map(c => `<span class="recalcul-chip" onclick="chipClick(this)">${c}</span>`).join("");
  const callFn = fromHistory ? `recalculFromHistory('${historyId}')` : "recalculCurrent()";
  return `
    <div class="recalcul-bar" id="recalcul-bar">
      <span class="recalcul-label">🔄 Affiner et relancer l'analyse intelligente</span>
      <div class="recalcul-chips">${chips}</div>
      <div class="recalcul-row">
        <textarea id="recalcul-input" class="recalcul-textarea" placeholder="Ajoutez vos précisions terrains : étage, état des supports, contraintes d'accès, budget max cible..."></textarea>
        <button class="recalcul-btn" id="recalcul-btn" onclick="${callFn}">Relancer</button>
      </div>
    </div>
  `;
}

function chipClick(el) {
  const inp = document.getElementById("recalcul-input");
  if (!inp) return;
  el.classList.toggle("on");
  const txt = el.textContent.trim();
  let val = inp.value.trim();
  if (el.classList.contains("on")) {
    inp.value = val ? val + " • " + txt : txt;
  } else {
    val = val.replace(" • " + txt, "").replace(txt + " •", "").replace(txt, "");
    inp.value = val.replace(/^[\s•]+|[\s•]+$/g, "").trim();
  }
}

function buildRefinePrompt(prevJson, note, sourceText) {
  return `Analyse précédente :\n${prevJson}\n\nPrécisions utilisateur :\n${note}\n\nDocument initial :\n${sourceText.slice(0, 12000)}\n\nInstructions :\n- Refais l'analyse en intégrant ces nouvelles contraintes.\n- Retourne uniquement le JSON.`;
}

async function recalculCurrent() {
  const inp = document.getElementById("recalcul-input");
  const note = inp ? inp.value.trim() : "";
  if (!note) return;
  document.getElementById("recalcul-btn").disabled = true;
  showStatus("loading", "Recalcul IA en cours…");
  try {
    const improved = await callAI(buildRefinePrompt(JSON.stringify(lastResult), note, lastExtractedText));
    renderResults(improved);
    hideStatus();
  } catch (err) { showError(err.message); }
}

================================================================ */
const HISTORY_KEY = "abrenov_history_v2";
function getHistory() { try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]"); } catch { return []; } }

function saveHistoryItem(result, htmlResult, textResult) {
  const history = getHistory();
  const labels = { devis: "Devis client", fourn: "Fournisseur", presta: "Prestataire" };
  const item = {
    id: Date.now().toString(),
    tab: currentTab,
    type: labels[currentTab] || currentTab,
    file: currentFile ? currentFile.name : "Sans fichier",
    date: new Date().toLocaleString("fr-FR"),
    summary: result.avis_global || result.verdict || result.lot || "Analyse",
    result: result, html: htmlResult, plain: textResult, sourceText: lastExtractedText
  };
  history.unshift(item);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, 50)));
}

function renderHistory() {
  const history = getHistory();
  emptyEl.style.display = "none";
  resultsEl.style.display = "flex";

  if (!history.length) {
    resultsEl.innerHTML = `<div class="history-empty">Aucune analyse mémorisée dans votre navigateur pour le moment.</div>`;
    return;
  }

  const listHtml = history.map(h => `
    <div class="history-card">
      <div class="history-card-top">
        <div class="history-type">${h.type}</div>
        <div class="history-file">${h.file}</div>
        <div class="history-date">${h.date}</div>
      </div>
      <div class="history-summary">${h.summary}</div>
      <div class="history-actions">
        <button class="tbtn tbtn-navy" onclick="openHistoryItem('${h.id}')">Consulter</button>
        <button class="tbtn tbtn-ghost" onclick="deleteHistoryItem('${h.id}')">Supprimer</button>
      </div>
    </div>
  `).join("");

  resultsEl.innerHTML = `
    <div class="history-wrap">
      <div class="history-head">
        <div class="history-title">Historique local des analyses</div>
        <button class="tbtn tbtn-ghost" style="color:#fff; border-color:rgba(255,255,255,0.3)" onclick="clearHistory()">Tout effacer</button>
      </div>
      <div class="history-list">${listHtml}</div>
    </div>
  `;
}

function openHistoryItem(id) {
  const item = getHistory().find(h => h.id === id);
  if (!item) return;
  emptyEl.style.display = "none";
  resultsEl.style.display = "flex";
  resultsEl.innerHTML = item.html;
  plainText = item.plain || "";
  btnCopy.style.display = "flex";
  btnReset.style.display = "flex";
}

function deleteHistoryItem(id) {
  const history = getHistory().filter(h => h.id !== id);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  renderHistory();
}

function clearHistory() {
  if (!confirm("Effacer tout l'historique ?")) return;
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
}
